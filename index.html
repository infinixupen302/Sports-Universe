    <style>
      :root {
        --bg: #05070d;
        --panel: #0a0e1a;
        --accent-blue: #3b82f6;
        --accent-purple: #a855f7;
        --live-red: #ef4444;
        --text: #e5e7eb;
        --text-dim: #9ca3af;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        background: #000;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .player-wrap {
        width: 100vw;
        height: 100vh;
        background: var(--panel);
        overflow: hidden;
        border-radius: 0;
      }
      .video-area {
        position: relative;
        width: 100%;
        height: calc(100vh - 95px);
        background: #000;
      }
      video {
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
      }
      .center-play {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: rgba(0, 0, 0, 0);
        transition: background 0.2s;
      }
      .center-play.hidden {
        display: none;
      }
      .center-play .big-btn {
        width: 74px;
        height: 74px;
        border-radius: 50%;
        background: rgba(20, 24, 38, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.15s,
          background 0.15s;
      }
      .center-play:hover .big-btn {
        background: rgba(20, 24, 38, 0.9);
        transform: scale(1.06);
      }
      .center-play svg {
        width: 30px;
        height: 30px;
        fill: #fff;
      }

      .spinner {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .spinner.active {
        display: flex;
      }
      .spinner .ring {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.15);
        border-top-color: var(--accent-blue);
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .controls {
        background: #06080f;
        padding: 6px 14px 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .progress-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 4px 0;
      }
      .live-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: var(--text-dim);
        flex: 0 0 auto;
      }
      .progress-track {
        position: relative;
        flex: 1;
        height: 4px;
        border-radius: 2px;
        background: linear-gradient(
          90deg,
          var(--accent-blue),
          var(--accent-purple)
        );
        cursor: pointer;
      }
      .progress-track input[type="range"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
        margin: 0;
      }
      .progress-track .knob {
        position: absolute;
        top: 50%;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
        pointer-events: none;
        transition: left 0.1s linear;
      }

      .btn-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .btn-row .left,
      .btn-row .right {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .ctrl-btn {
        background: none;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        padding: 4px;
        border-radius: 6px;
        transition:
          color 0.15s,
          background 0.15s;
      }
      .ctrl-btn:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
      }
      .ctrl-btn svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .ctrl-btn.icon-only svg {
        fill: currentColor;
        stroke: none;
      }

      .live-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: var(--live-red);
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
      }
      .live-pill.paused {
        color: var(--text-dim);
        border-color: rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.04);
      }
      .live-pill .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }
      .live-pill.active .dot {
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .menu-wrap {
        position: relative;
      }
      .menu {
        position: absolute;
        bottom: 36px;
        right: 0;
        background: #11162a;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        min-width: 170px;
        padding: 6px;
        display: none;
        flex-direction: column;
        gap: 2px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        z-index: 20;
        max-height: 240px;
        overflow-y: auto;
      }
      .menu.open {
        display: flex;
      }
      .menu-item {
        background: none;
        border: none;
        color: var(--text);
        text-align: left;
        padding: 8px 10px;
        border-radius: 5px;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .menu-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .menu-item.active {
        color: var(--accent-blue);
        font-weight: 700;
      }

      .status-line {
        font-size: 12px;
        color: var(--text-dim);
        padding: 8px 14px;
      }
      .status-line.error {
        color: #f87171;
      }
      .status-line.ok {
        color: #4ade80;
      }

      @media (max-width: 520px) {
        .btn-row .left,
        .btn-row .right {
          gap: 8px;
        }
        .ctrl-btn span {
          display: none;
        }
        .ctrl-btn.icon-only span,
        .live-pill span {
          display: inline;
        }
        .ctrl-btn svg {
          width: 18px;
          height: 18px;
        }
      }

      .watermark {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 100;
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        user-select: none;
      }
    </style>

//   keys: {
//     "34475edab991ad5e92548aebd710410a": "501b209cccd323ac00bf5ac15b406cb4",

// CTV: {
//   name: "CTV",
//   manifest: "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/rcgdlutvzh/out/v1/d08fb8f93d8142be9ae3305e3c953694/cenc.mpd",
//   keys: {
//     "1fb1ab890f1b9392db40321042ad194b": "7c9d16a71ccdb3ced4ff1344c8c75d67",
//   },
// }, 
// sportv_br_hd: {
//   name: "SporTV BR HD",
//   manifest: "https://a121aivottepl-a.akamaihd.net/gru-nitro/live/clients/dash/enc/tvezxbddeg/out/v1/3aa321e477504937a439b602e078eb18/cenc.mpd",
//   keys: {
//     "cb5eaea6d91fc8a702f154cefd69c976": "fd4b69623da596aac100e5722d8a1ca0",
//   },
// },  
};

      const SOURCE_LIST = Object.values(SOURCES);

      const DEFAULT_SOURCE_INDEX = 0;
      let currentSourceIndex = -1;

      // ---- Elements ----
      const statusLine = document.getElementById("statusLine");
      const centerPlay = document.getElementById("centerPlay");
      const spinner = document.getElementById("spinner");
      const playBtn = document.getElementById("playBtn");
      const muteBtn = document.getElementById("muteBtn");
      const livePill = document.getElementById("livePill");
      const seekRange = document.getElementById("seekRange");
      const progressKnob = document.getElementById("progressKnob");
      // speed controls removed
      const sourceMenu = document.getElementById("sourceMenu");
      const sourceLabel = document.getElementById("sourceLabel");
      const qualityMenu = document.getElementById("qualityMenu");
      const qualityLabel = document.getElementById("qualityLabel");
      // captions and PiP removed
      const fullscreenBtn = document.getElementById("fullscreenBtn");
      const videoArea = document.getElementById("videoArea");

      const PLAY_ICON = '<path d="M8 5v14l11-7z"/>';
      const PAUSE_ICON = '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
      const VOL_ON =
        '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
      const VOL_OFF =
        '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M23 9l-6 6M17 9l6 6"/>';

      function setStatus(msg, type = "") {
        statusLine.textContent = msg;
        statusLine.className = "status-line" + (type ? " " + type : "");
      }

      // ---- ClearKey config helper ----
      function buildClearKeyConfig(keysObj) {
        if (!keysObj || Object.keys(keysObj).length === 0) return null;
        return {
          drm: {
            clearKeys: { ...keysObj }, // { kidHex: keyHex, ... }
          },
        };
      }

      // ---- Load a source by index ----
      async function loadSourceByIndex(idx) {
        const src = SOURCE_LIST[idx];
        if (!src) return;
        currentSourceIndex = idx;
        sourceLabel.textContent = src.name;
        buildSourceMenu();

        spinner.classList.add("active");
        setStatus("Loading: " + src.name + " ...");

        // Fix 5: Reset ClearKey config; only apply keys for DASH/MPD (not HLS)
        player.configure({ drm: { clearKeys: {} } });
        const isHLS = src.manifest.toLowerCase().includes(".m3u8");
        if (!isHLS) {
          const ckConfig = buildClearKeyConfig(src.keys);
          if (ckConfig) player.configure(ckConfig);
        }

        try {
          await player.load(src.manifest);
          setStatus("Playing: " + src.name, "ok");
          spinner.classList.remove("active");
          centerPlay.classList.add("hidden");
          video.play();
          populateQualityMenu();
        } catch (err) {
          spinner.classList.remove("active");
          setStatus("Error loading " + src.name + ": " + err.message, "error");
          console.error(err);
        }
      }

      // ---- Source menu ----
      function buildSourceMenu() {
        sourceMenu.innerHTML = "";
        SOURCE_LIST.forEach((s, i) => {
          const item = document.createElement("button");
          item.className =
            "menu-item" + (i === currentSourceIndex ? " active" : "");
          item.textContent = s.name;
          item.addEventListener("click", () => {
            sourceMenu.classList.remove("open");
            if (i !== currentSourceIndex) loadSourceByIndex(i);
          });
          sourceMenu.appendChild(item);
        });
      }

      // ---- Quality menu ----
      function populateQualityMenu() {
        qualityMenu.innerHTML = "";
        const tracks = player.getVariantTracks();
        const autoItem = document.createElement("button");
        autoItem.className = "menu-item active";
        autoItem.textContent = "Auto";
        autoItem.addEventListener("click", () => {
          player.configure({ abr: { enabled: true } });
          qualityLabel.textContent = "Auto";
          highlightQuality(null);
          qualityMenu.classList.remove("open");
        });
        qualityMenu.appendChild(autoItem);

        const seen = new Set();
        tracks
          .filter((t) => t.type === "variant" && t.height)
          .sort((a, b) => b.height - a.height)
          .forEach((t) => {
            const key = t.height + "p";
            if (seen.has(key)) return;
            seen.add(key);
            const item = document.createElement("button");
            item.className = "menu-item";
            item.textContent = key;
            item.addEventListener("click", () => {
              player.configure({ abr: { enabled: false } });
              const match = tracks.find((tr) => tr.height === t.height);
              if (match) player.selectVariantTrack(match, true);
              qualityLabel.textContent = key;
              highlightQuality(key);
              qualityMenu.classList.remove("open");
            });
            qualityMenu.appendChild(item);
          });
      }
      function highlightQuality(active) {
        [...qualityMenu.children].forEach((c) => {
          c.classList.toggle(
            "active",
            (active === null && c.textContent === "Auto") ||
              c.textContent === active,
          );
        });
      }

      // speed, captions removed

      // ---- Menu toggles ----
      document.querySelectorAll(".menu-wrap").forEach((wrap) => {
        const btn = wrap.querySelector("button");
        const menu = wrap.querySelector(".menu");
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const isOpen = menu.classList.contains("open");
          document
            .querySelectorAll(".menu")
            .forEach((m) => m.classList.remove("open"));
          if (!isOpen) menu.classList.add("open");
        });
      });
      document.addEventListener("click", () => {
        document
          .querySelectorAll(".menu")
          .forEach((m) => m.classList.remove("open"));
      });

      // ---- Play / Pause ----
      function togglePlay() {
        if (video.paused) video.play();
        else video.pause();
      }
      playBtn.addEventListener("click", togglePlay);
      centerPlay.addEventListener("click", togglePlay);

      video.addEventListener("play", () => {
        document.getElementById("playIcon").outerHTML =
          `<svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" stroke="none">${PAUSE_ICON}</svg>`;
        centerPlay.classList.add("hidden");
        updateLivePill();
      });
      video.addEventListener("pause", () => {
        document.getElementById("playIcon").outerHTML =
          `<svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" stroke="none">${PLAY_ICON}</svg>`;
        centerPlay.classList.remove("hidden");
        updateLivePill();
      });
      // Fix 3: Stall auto-recovery — if stuck >8s on live, jump to live edge and retry
      let stallTimer = null;
      video.addEventListener("waiting", () => {
        spinner.classList.add("active");
        clearTimeout(stallTimer);
        stallTimer = setTimeout(() => {
          try {
            if (player.isLive()) {
              const sr = player.seekRange();
              if (sr && sr.end) video.currentTime = Math.max(sr.start, sr.end - 1);
            }
            video.play().catch(() => {});
          } catch (e) { console.warn("Stall recovery error:", e); }
        }, 8000);
      });
      video.addEventListener("playing", () => {
        spinner.classList.remove("active");
        clearTimeout(stallTimer);
      });
      video.addEventListener("canplay", () => {
        spinner.classList.remove("active");
        clearTimeout(stallTimer);
      });

      // ---- Mute ----
      muteBtn.addEventListener("click", () => {
        video.muted = !video.muted;
        document.getElementById("volIcon").outerHTML =
          `<svg id="volIcon" viewBox="0 0 24 24">${video.muted ? VOL_OFF : VOL_ON}</svg>`;
      });

      // ---- Live pill + seek bar ----
      function updateLivePill() {
        const atLiveEdge = isAtLiveEdge();
        livePill.classList.toggle("active", atLiveEdge && !video.paused);
        livePill.classList.toggle("paused", video.paused || !atLiveEdge);
      }
      function isAtLiveEdge() {
        if (!player.isLive()) return false;
        const sr = player.seekRange();
        return sr.end - video.currentTime < 4;
      }
      livePill.addEventListener("click", () => {
        if (player.isLive()) {
          const sr = player.seekRange();
          video.currentTime = sr.end;
          if (video.paused) video.play();
        }
      });

      let seekDragging = false;
      seekRange.addEventListener("input", () => {
        seekDragging = true;
        if (!player.isLive()) return;
        const sr = player.seekRange();
        const pct = seekRange.value / 1000;
        video.currentTime = sr.start + pct * (sr.end - sr.start);
      });
      seekRange.addEventListener("change", () => {
        seekDragging = false;
      });

      setInterval(() => {
        if (!player.isLive() || seekDragging) return;
        const sr = player.seekRange();
        const total = sr.end - sr.start;
        const pos = video.currentTime - sr.start;
        const pct =
          total > 0 ? Math.min(100, Math.max(0, (pos / total) * 100)) : 100;
        seekRange.value = pct * 10;
        progressKnob.style.left = pct + "%";
        updateLivePill();
      }, 500);

      // PiP removed

      // ---- Fullscreen ----
      fullscreenBtn.addEventListener("click", () => {
        if (!document.fullscreenElement)
          videoArea.parentElement.requestFullscreen();
        else document.exitFullscreen();
      });

      // ---- Error listener ----
      player.addEventListener("error", (e) => {
        setStatus("Player error: " + e.detail.message, "error");
        console.error("Shaka error", e.detail);
      });

      // ---- Init ----
      buildSourceMenu();
      if (SOURCE_LIST.length) {
        loadSourceByIndex(DEFAULT_SOURCE_INDEX);
      } else {
        setStatus("No sources configured.", "error");
      }
    </script>
  </body>
</html>
